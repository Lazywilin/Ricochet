<script>
// ── QUESTION BANK ───────────────────────────────────────────────
const questions = [
    { q:"Which of the following is a primary function of Management according to Henri Fayol?", opts:["Planning","Marketing","Accounting","Manufacturing"], ans:0, sec:"Management" },
    { q:"What type of business organization offers limited liability to ALL its owners?", opts:["Sole Proprietorship","Partnership","Corporation","Cooperative"], ans:2, sec:"Business Organization" },
    { q:"Which financial statement shows revenues and expenses over a period?", opts:["Balance Sheet","Cash Flow Statement","Income Statement","Statement of Equity"], ans:2, sec:"Accounting" },
    { q:"What does 'liquidity' refer to in finance?", opts:["Long-term profitability","Ability to meet short-term obligations","Total assets","Stock market valuation"], ans:1, sec:"Finance" },
    { q:"The break-even point is where:", opts:["Revenue exceeds costs","Total costs equal total revenue","Profit is maximized","Fixed costs are zero"], ans:1, sec:"Accounting" },
    { q:"Which is a characteristic of a sole proprietorship?", opts:["Unlimited liability","Limited liability","Shared ownership","Perpetual existence"], ans:0, sec:"Business Organization" },
    { q:"What is the primary goal of financial management?", opts:["Maximize revenue","Minimize costs","Maximize shareholder wealth","Maximize market share"], ans:2, sec:"Finance" },
    { q:"Which document outlines the internal rules governing a company?", opts:["Memorandum of Association","Articles of Association","Prospectus","Annual Report"], ans:1, sec:"Business Law" },
    { q:"Depreciation is best described as:", opts:["Cash expense","Non-cash expense","Revenue","Capital gain"], ans:1, sec:"Accounting" },
    { q:"Which management level is responsible for day-to-day operations?", opts:["Top management","Middle management","Supervisory management","Board of Directors"], ans:2, sec:"Management" },
    { q:"What is 'working capital'?", opts:["Fixed assets minus liabilities","Current assets minus current liabilities","Total equity","Net profit"], ans:1, sec:"Finance" },
    { q:"A partnership firm is automatically dissolved upon:", opts:["Profit loss","Death of a partner","Market change","New partner joining"], ans:1, sec:"Business Organization" },
    { q:"Which is NOT a function of a central bank?", opts:["Issuing currency","Lender of last resort","Accepting retail deposits","Regulating commercial banks"], ans:2, sec:"Banking" },
    { q:"'Goodwill' in accounting refers to:", opts:["Customer relationships only","Intangible asset from brand/reputation","Cash reserves","Fixed assets"], ans:1, sec:"Accounting" },
    { q:"Which pricing strategy sets a low initial price to gain market share?", opts:["Price skimming","Penetration pricing","Cost-plus pricing","Premium pricing"], ans:1, sec:"Marketing" },
    { q:"SWOT analysis stands for:", opts:["Strengths, Weaknesses, Opportunities, Threats","Sales, Work, Operations, Targets","Strategy, Workforce, Output, Tactics","Strengths, Workforce, Opportunities, Threats"], ans:0, sec:"Strategy" },
    { q:"Which is a long-term source of finance?", opts:["Bank overdraft","Trade credit","Debentures","Creditors"], ans:2, sec:"Finance" },
    { q:"The 4 Ps of marketing are:", opts:["Product, Price, Place, Promotion","People, Price, Place, Profit","Product, Profit, Place, Promotion","Product, Price, People, Profit"], ans:0, sec:"Marketing" },
    { q:"What is a 'debenture'?", opts:["Share in a company","Long-term debt instrument","Bank deposit","Type of insurance"], ans:1, sec:"Finance" },
    { q:"Which inventory method assumes first items purchased are first sold?", opts:["LIFO","FIFO","Weighted Average","Specific Identification"], ans:1, sec:"Accounting" },
    { q:"'Elasticity of demand' measures:", opts:["Total demand in a market","Responsiveness of demand to price changes","Production capacity","Profit margins"], ans:1, sec:"Economics" },
    { q:"A company's 'equity' is:", opts:["Total liabilities","Assets minus liabilities","Total revenue","Net sales"], ans:1, sec:"Accounting" },
    { q:"Which insurance covers a business against employee theft?", opts:["Fire insurance","Fidelity guarantee insurance","Marine insurance","Life insurance"], ans:1, sec:"Insurance" },
    { q:"'Outsourcing' means:", opts:["Expanding operations internally","Hiring internal contract workers","Delegating functions to external firms","Merging with another company"], ans:2, sec:"Management" },
    { q:"The 'current ratio' is calculated as:", opts:["Net profit / Revenue","Current assets / Current liabilities","Total assets / Total liabilities","Equity / Total assets"], ans:1, sec:"Accounting" },
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let totalSeconds = 25 * 60;
let perQSeconds = 60;
let perQTimer = null;
const circumference = 250;

// ── DOM REFS (using exact classes found in HTML) ─────────────────
const mainTimerEl   = document.querySelector('.font-timer-display');
const qTimerEl      = document.querySelector('.absolute.font-timer-display');
const circleEl      = document.querySelector('circle.text-orange-500');
const sectionEl     = document.querySelector('h2.font-headline-md');
const questionNumEl = document.querySelector('h1.font-headline-md');
const questionTextEl= document.querySelector('.font-lexend.text-\\[20px\\]');
const optButtons    = Array.from(document.querySelectorAll('.grid.grid-cols-1 button'));
const progressBar   = document.querySelector('.bg-orange-600.h-full');

function fmtTime(s) {
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function showToast(msg) {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:80px;right:24px;background:#1e293b;color:white;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.5s';
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),500); }, 2500);
}

// ── RENDER QUESTION ─────────────────────────────────────────────
function renderQuestion() {
    const q = questions[current];

    if (sectionEl)     sectionEl.textContent = 'Section: ' + q.sec;
    if (questionNumEl) questionNumEl.textContent = 'Question ' + (current+1) + ' of ' + questions.length;
    if (questionTextEl) questionTextEl.textContent = q.q;

    optButtons.forEach((btn, i) => {
        // Update text
        const textEl = btn.querySelector('span.font-lexend');
        if (textEl) textEl.textContent = q.opts[i];

        // Update label letter
        const labelEl = btn.querySelector('div.rounded-full');
        if (labelEl) labelEl.textContent = ['A','B','C','D'][i];

        // Remove old check icon
        btn.querySelectorAll('[data-icon="check_circle"]').forEach(el => el.remove());

        // Reset styles
        btn.style.borderColor = '';
        btn.style.background = '';
        btn.style.border = '';
        if (labelEl) {
            labelEl.style.background = '';
            labelEl.style.color = '';
            labelEl.style.borderColor = '';
        }

        // Apply saved answer style
        if (answers[current] === i) {
            applySelected(btn, labelEl);
        }
    });

    // Update progress bar
    if (progressBar) progressBar.style.width = (((current+1) / questions.length) * 100) + '%';

    resetPerQTimer();
}

function applySelected(btn, labelEl) {
    btn.style.borderColor = '#ea580c';
    btn.style.background = 'rgba(234,88,12,0.08)';
    btn.style.outline = '2px solid #ea580c';
    if (labelEl) {
        labelEl.style.background = '#ea580c';
        labelEl.style.color = 'white';
        labelEl.style.borderColor = '#ea580c';
    }
}

// ── OPTION CLICK ────────────────────────────────────────────────
optButtons.forEach((btn, i) => {
    btn.addEventListener('click', () => {
        answers[current] = i;
        optButtons.forEach((b, j) => {
            const lbl = b.querySelector('div.rounded-full');
            b.style.borderColor = '';
            b.style.background = '';
            b.style.outline = '';
            if (lbl) { lbl.style.background=''; lbl.style.color=''; lbl.style.borderColor=''; }
            b.querySelectorAll('[data-icon="check_circle"]').forEach(el => el.remove());
        });
        const labelEl = btn.querySelector('div.rounded-full');
        applySelected(btn, labelEl);
        // Add check icon
        const check = document.createElement('span');
        check.className = 'material-symbols-outlined ml-auto text-orange-500';
        check.dataset.icon = 'check_circle';
        check.style.fontVariationSettings = "'FILL' 1";
        check.textContent = 'check_circle';
        btn.appendChild(check);
    });
});

// ── FOOTER NAV BUTTONS ───────────────────────────────────────────
document.querySelectorAll('footer button').forEach(btn => {
    const icon = btn.querySelector('[data-icon]');
    if (!icon) return;
    if (icon.dataset.icon === 'arrow_back') {
        btn.addEventListener('click', () => {
            if (current > 0) { current--; renderQuestion(); }
            else showToast('This is the first question');
        });
    }
    if (icon.dataset.icon === 'arrow_forward') {
        btn.addEventListener('click', () => {
            if (current < questions.length - 1) { current++; renderQuestion(); }
            else finishExam();
        });
    }
    if (icon.dataset.icon === 'list_alt') {
        btn.addEventListener('click', showReviewPanel);
    }
});

// ── FINISH BUTTON ────────────────────────────────────────────────
document.querySelectorAll('header button').forEach(btn => {
    const t = btn.textContent.trim().toLowerCase();
    if (t.includes('finish') || t.includes('submit') || t.includes('end')) {
        btn.addEventListener('click', finishExam);
    }
});
// Also match by class bg-orange-600 in header
document.querySelector('header .bg-orange-600')?.addEventListener('click', finishExam);

// ── FINISH EXAM ──────────────────────────────────────────────────
function finishExam() {
    clearInterval(examInterval);
    clearInterval(perQTimer);
    const correct  = answers.filter((a,i) => a === questions[i].ans).length;
    const total    = questions.length;
    const attempted= answers.filter(a => a !== null).length;
    const pct      = Math.round((correct / total) * 100);
    const grade    = pct >= 80 ? 'A' : pct >= 65 ? 'B' : pct >= 50 ? 'C' : 'D';
    const emoji    = pct >= 80 ? '🏆' : pct >= 65 ? '✅' : pct >= 50 ? '📚' : '💪';

    document.querySelector('main').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:24px;text-align:center;font-family:sans-serif;">
        <div style="background:#1e293b;border:1px solid #334155;border-radius:24px;padding:40px 32px;max-width:480px;width:100%;">
            <div style="font-size:64px;margin-bottom:12px;">${emoji}</div>
            <h1 style="font-size:28px;font-weight:800;color:white;margin:0 0 6px;">Exam Complete!</h1>
            <p style="color:#64748b;margin:0 0 28px;font-size:14px;">Grade: <strong style="color:#ea580c">${grade}</strong></p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;">
                <div style="background:#0f172a;border-radius:16px;padding:20px;"><div style="font-size:36px;font-weight:800;color:#ea580c;">${correct}</div><div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;">Correct</div></div>
                <div style="background:#0f172a;border-radius:16px;padding:20px;"><div style="font-size:36px;font-weight:800;color:#f87171;">${total-correct}</div><div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;">Wrong</div></div>
                <div style="background:#0f172a;border-radius:16px;padding:20px;"><div style="font-size:36px;font-weight:800;color:#14b8a6;">${pct}%</div><div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;">Score</div></div>
                <div style="background:#0f172a;border-radius:16px;padding:20px;"><div style="font-size:36px;font-weight:800;color:#94a3b8;">${attempted}/${total}</div><div style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;">Attempted</div></div>
            </div>
            <button onclick="location.href='exams.html'" style="width:100%;padding:14px;background:#ea580c;color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.05em;">Back to Exams</button>
        </div>
    </div>`;
}

// ── REVIEW PANEL ─────────────────────────────────────────────────
function showReviewPanel() {
    const existing = document.getElementById('review-panel');
    if (existing) existing.remove();
    const panel = document.createElement('div');
    panel.id = 'review-panel';
    panel.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
    const dots = questions.map((q,i) => {
        const col = i === current ? '#ea580c' : answers[i] !== null ? '#14b8a6' : '#334155';
        return `<button onclick="document.getElementById('review-panel').remove();current=${i};renderQuestion();" style="width:40px;height:40px;border-radius:8px;background:${col};color:white;font-weight:700;border:none;cursor:pointer;font-size:13px;">${i+1}</button>`;
    }).join('');
    panel.innerHTML = `
    <div style="background:#1e293b;border-radius:20px;padding:28px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;font-family:sans-serif;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 style="color:white;font-size:18px;font-weight:700;margin:0;">Question Map</h2>
            <button onclick="document.getElementById('review-panel').remove()" style="background:#334155;border:none;color:white;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">✕</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">${dots}</div>
        <div style="display:flex;gap:16px;font-size:11px;color:#64748b;flex-wrap:wrap;">
            <span>🟠 Current</span>
            <span><span style="color:#14b8a6">■</span> Answered (${answers.filter(a=>a!==null).length})</span>
            <span><span style="color:#334155">■</span> Skipped (${answers.filter(a=>a===null).length})</span>
        </div>
    </div>`;
    document.body.appendChild(panel);
}

// ── MAIN TIMER ───────────────────────────────────────────────────
const examInterval = setInterval(() => {
    totalSeconds--;
    if (totalSeconds <= 0) { clearInterval(examInterval); finishExam(); return; }
    if (mainTimerEl) mainTimerEl.textContent = fmtTime(totalSeconds);
}, 1000);

// ── PER-QUESTION TIMER ────────────────────────────────────────────
function resetPerQTimer() {
    clearInterval(perQTimer);
    perQSeconds = 60;
    perQTimer = setInterval(() => {
        perQSeconds--;
        if (qTimerEl)  qTimerEl.textContent = perQSeconds;
        if (circleEl) {
            const offset = circumference * (perQSeconds / 60);
            circleEl.setAttribute('stroke-dashoffset', offset.toFixed(1));
        }
        if (perQSeconds <= 0) {
            clearInterval(perQTimer);
            if (current < questions.length - 1) { current++; renderQuestion(); }
            else finishExam();
        }
    }, 1000);
}

// ── INIT ─────────────────────────────────────────────────────────
renderQuestion();
</script>
</body></html>
