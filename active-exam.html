<script>
// Exam countdown timer - 25 minutes
let totalSeconds = 25 * 60;
let perQSeconds = 60;
let answered = 1;
const totalQ = 25;

function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

// Main exam timer (top bar)
const mainTimerEl = document.querySelector('.font-timer-display');
const examInterval = setInterval(() => {
    totalSeconds--;
    if (totalSeconds <= 0) { clearInterval(examInterval); totalSeconds = 0; }
    if (mainTimerEl) mainTimerEl.textContent = fmtTime(totalSeconds);
}, 1000);

// Per-question circular timer
const circleEl = document.querySelector('circle.text-orange-500');
const qTimerEl = document.querySelector('.absolute.font-timer-display');
const circumference = 250; // stroke-dasharray value

const qInterval = setInterval(() => {
    perQSeconds--;
    if (perQSeconds <= 0) { perQSeconds = 0; clearInterval(qInterval); }
    if (qTimerEl) qTimerEl.textContent = perQSeconds;
    if (circleEl) {
        const offset = circumference * (1 - perQSeconds / 60);
        circleEl.setAttribute('stroke-dashoffset', offset.toFixed(1));
    }
}, 1000);

// Option selection interactivity
document.querySelectorAll('main button:not([class*="bg-orange-6"])').forEach(btn => {
    if (!btn.querySelector('[data-icon]')) {
        btn.addEventListener('click', function() {
            // Deselect all
            document.querySelectorAll('main button').forEach(b => {
                b.classList.remove('border-orange-600', 'bg-orange-950/20', 'border-2');
                b.classList.add('border', 'border-slate-200', 'dark:border-slate-800');
                const circle = b.querySelector('div.rounded-full');
                if (circle) { circle.classList.remove('bg-orange-600', 'text-white', 'border-orange-600'); circle.classList.add('border-slate-700', 'text-slate-400'); }
                const check = b.querySelector('[data-icon="check_circle"]');
                if (check) check.remove();
            });
            // Select this
            this.classList.add('border-2', 'border-orange-600', 'bg-orange-950/20');
            this.classList.remove('border', 'border-slate-200');
            const circle = this.querySelector('div.rounded-full');
            if (circle) { circle.classList.add('bg-orange-600', 'text-white', 'border-orange-600'); circle.classList.remove('border-slate-700', 'text-slate-400'); }
        });
    }
});

// Progress bar update
const progressBar = document.querySelector('.bg-orange-600.h-full');
if (progressBar) progressBar.style.width = ((answered / totalQ) * 100) + '%';
</script>
